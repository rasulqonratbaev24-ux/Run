<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Animal Race PRO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(#2c3e50,#1e272e);
  color:white;
  text-align:center;
}

h1{margin:10px;}

#board{
  position:relative;
  width:100%;
  height:80vh;
}

.cell{
  position:absolute;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#d2b48c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
}

.special{
  background:#f1c40f;
}

.freeze{ background:#3498db; }
.back{ background:#2c3e50; color:white;}
.prize{ background:#2ecc71; }

.player{
  position:absolute;
  font-size:20px;
}

#ui{
  margin:10px;
}

button{
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#e67e22;
  color:white;
}

</style>
</head>

<body>

<h1>🐾 Animal Race PRO</h1>

<div id="board"></div>

<div id="ui">
  <div id="dice">🎲</div>
  <button onclick="roll()">Taslaw</button>
  <div id="status"></div>
</div>

<script>

const board = document.getElementById("board");
const total = 100;

// 🧠 yo‘lak (egri)
let path = [];

for(let i=0;i<total;i++){
  let x = 50 + Math.sin(i/5)*200 + (i*3);
  let y = 50 + Math.cos(i/4)*150 + (i*2);

  path.push({x,y});
}

// 🎲 kataklar
for(let i=0;i<total;i++){
  let c = document.createElement("div");
  c.className="cell";
  c.id="c"+i;
  c.innerText=i+1;

  c.style.left=path[i].x+"px";
  c.style.top=path[i].y+"px";

  board.appendChild(c);
}

// 🎯 special kataklar
let freeze=[10,25,40,70];
let back=[15,55];
let bonus=[20,60,80,90];
let prize=[5,30,50,85];

freeze.forEach(i=>document.getElementById("c"+i).classList.add("freeze"));
back.forEach(i=>document.getElementById("c"+i).classList.add("back"));
bonus.forEach(i=>document.getElementById("c"+i).classList.add("special"));
prize.forEach(i=>document.getElementById("c"+i).classList.add("prize"));

// 🐾 playerlar
const players=["🦁","🐯","🐼","🐺"];
let pos=[0,0,0,0];
let turn=0;
let skip=[false,false,false,false];

function draw(){
  document.querySelectorAll(".player").forEach(e=>e.remove());

  players.forEach((p,i)=>{
    let el=document.createElement("div");
    el.className="player";
    el.innerText=p;

    el.style.left=(path[pos[i]].x)+"px";
    el.style.top=(path[pos[i]].y)+"px";

    board.appendChild(el);
  });
}

function roll(){

  if(skip[turn]){
    skip[turn]=false;
    alert("Muzlaw ❄️ skip");
    next();
    return;
  }

  let r=Math.floor(Math.random()*6)+1;
  document.getElementById("dice").innerText=r;

  pos[turn]+=r;

  if(pos[turn]>=99){
    alert(players[turn]+" yutdi!");
    return;
  }

  // 🎯 EFFECTS
  if(freeze.includes(pos[turn])){
    skip[turn]=true;
  }

  if(back.includes(pos[turn])){
    pos[turn]-=5;
  }

  if(bonus.includes(pos[turn])){
    pos[turn]+=3;
  }

  if(prize.includes(pos[turn])){
    alert("Yana tashlaysan!");
    draw();
    return;
  }

  draw();
  next();
}

function next(){
  turn=(turn+1)%4;
  document.getElementById("status").innerText="Nawbet: "+players[turn];
}

draw();
next();

</script>

</body>
</html>
